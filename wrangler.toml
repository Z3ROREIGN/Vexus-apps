name = "vexus-apps"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# KV Namespace para armazenar compras
[[kv_namespaces]]
binding = "PURCHASES"
id = "seu-kv-namespace-id-aqui"

# Environment Variables - Configure no Cloudflare Dashboard
[vars]
# BITSO_API_KEY = ""
# DISCORD_WEBHOOK_URL = ""

[env.production]
name = "vexus-apps-production"
# Se estiver usando domínio customizado no Worker
# routes = [
#   { pattern = "vexusapps.shop/api/*", zone_name = "vexusapps.shop" }
# ]

[[env.production.kv_namespaces]]
binding = "PURCHASES"
id = "seu-kv-namespace-id-aqui"
