name = "vexus-apps"
main = "worker.js"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Cloudflare Pages - Frontend
pages_build_output_dir = "."

# KV Namespace para armazenar compras
[[kv_namespaces]]
binding = "PURCHASES"
id = "seu-kv-namespace-id-aqui"

# Environment Variables - Configure no Cloudflare Dashboard
[env.production]
name = "vexus-apps-production"
routes = [
  { pattern = "vexusapps.shop/*", zone_name = "vexusapps.shop" }
]

[env.production.vars]
# Nenhuma variável sensível aqui!
# Configure tudo no Cloudflare Dashboard

# Secrets - Configure no Cloudflare Dashboard
# wrangler secret put BITSO_API_KEY
# wrangler secret put BITSO_API_SECRET
# wrangler secret put DISCORD_WEBHOOK_URL
